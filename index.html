<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Login</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#e8eef5;
}

.container{
    width:350px;
    margin:40px auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    text-align:center;
}

.logo{
    width:120px;
    height:120px;
    object-fit:contain;   /* Keeps the whole image visible */
    margin-bottom:15px;
}

h2{
    color:#003366;
    margin-bottom:20px;
}

input{
    width:95%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#003366;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0055aa;
}
</style>

</head>
<body>

<div class="container">

    <img src="college_logo.jpg" alt="College Logo" class="logo">

    <h2>KLN COLLEGE OF ENGINEERING</h2>

    <input type="text" placeholder="Username">

    <input type="password" placeholder="Password">

    <input type="text" placeholder="Student Name">

    <input type="text" placeholder="Register Number">

    <input type="text" placeholder="Department">

    <input type="text" placeholder="Year">

    <button>Login</button>

</div>

</body>
</html>
