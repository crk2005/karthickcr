<!DOCTYPE html>
<html>
<head>
    <title>College Login</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .box{
            width:300px;
            margin:50px auto;
            padding:20px;
            background:white;
            text-align:center;
            border:1px solid #ccc;
        }

        img{
            width:100px;
            height:100px;
            border-radius:50%;
            margin-bottom:15px;
        }

        input{
            width:90%;
            padding:8px;
            margin:8px 0;
        }

        button{
            width:95%;
            padding:10px;
            background:blue;
            color:white;
            border:none;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="box">

    <img src="https://github.com/crk2005/karthickcr/blob/main/college_logo.jpg" alt="College Logo">

    <h3>College Login</h3>

    <input type="text" placeholder="Username"><br>

    <input type="password" placeholder="Password"><br>

    <input type="text" placeholder="Student Name"><br>

    <input type="text" placeholder="Register Number"><br>

    <input type="text" placeholder="Department"><br>

    <input type="text" placeholder="Year"><br>

    <button>Login</button>

</div>

</body>
</html>
